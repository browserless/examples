# Endpoint: https://production-sfo.browserless.io/chromium/bql?token=YOUR_API_TOKEN_HERE
# BQL IDE:  https://account.browserless.io/bql
#
# The screenshot mutation returns a base64-encoded PNG. Decode it client-side to write the file.

mutation Screenshot {
  goto(url: "https://scraping-sandbox.netlify.app/receipt") {
    status
  }

  screenshot(omitBackground: true) {
    base64
  }
}
